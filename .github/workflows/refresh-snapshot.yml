name: Refresh data snapshot

# Keeps the bundled offline fallback fresh by re-fetching openfootball daily.
# A commit here triggers Vercel's auto-deploy, so the fallback never drifts far.
on:
  schedule:
    - cron: '17 5 * * *' # daily, 05:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest snapshot
        run: |
          curl -sSf \
            https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json \
            -o src/data/worldcup2026.snapshot.json
      - name: Commit if changed
        run: |
          if git diff --quiet src/data/worldcup2026.snapshot.json; then
            echo "Snapshot unchanged, nothing to commit."
          else
            git config user.name "snapshot-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/worldcup2026.snapshot.json
            git commit -m "chore(data): refresh bundled snapshot"
            git push
          fi
